name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint (apps/web)
        run: npm --prefix apps/web run lint

      - name: Typecheck (packages/core)
        run: npm --prefix packages/core run typecheck

      - name: Typecheck (packages/exercises)
        run: npm --prefix packages/exercises run typecheck

      - name: Test (packages/core)
        run: npm run test:core

      - name: Test (packages/data)
        run: npm run test:data

      - name: Test (packages/exercises)
        run: npm run test:exercises

      - name: Test (apps/web)
        run: npm run test:web

      - name: Install Playwright browsers
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: E2E (apps/web)
        # Not a real access key: a test-only value whose SHA-256 hash is
        # baked into this build via the client-side fallback (Cloudflare
        # Pages Functions don't run under `vite preview`). See
        # apps/web/e2e/onboarding.spec.js and CLAUDE.md "Accès par clé".
        env:
          VITE_FALLBACK_KEY_HASHES: f422821e3d707a6557c0b112a856927c754b5ca0842cb44503e6e028aa539a16
        run: npm run test:e2e
